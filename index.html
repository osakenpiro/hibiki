<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIBIKI - 4コードアルペジオメーカー</title>
<meta name="description" content="少ない音で、深く響く。4つのコードで心に残るアルペジオを生み出す、ミニマル作曲ツール。">
<meta property="og:title" content="HIBIKI - 4コードアルペジオメーカー">
<meta property="og:description" content="少ない音で、深く響く。引き算の美学で、あなただけのメロディを。">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#111118;--surface:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.06);--border-active:rgba(180,160,120,0.4);
  --text:#c9c4b8;--text-dim:#6a6575;--text-faint:#4a4555;
  --gold:#c9b87a;--gold-bg:rgba(180,160,120,0.12);--gold-border:rgba(180,160,120,0.3);
  --blue:#8ab4d4;--blue-bg:rgba(100,140,180,0.1);--blue-border:rgba(100,140,180,0.3);
  --red:#c87070;--red-bg:rgba(200,80,80,0.15);--red-border:rgba(200,80,80,0.4);
}
body{
  background:linear-gradient(145deg,var(--bg) 0%,#12121f 50%,#0d0d18 100%);
  color:var(--text);font-family:'Noto Serif JP','Cormorant Garamond',serif;
  min-height:100vh;padding:0;
}
.container{max-width:720px;margin:0 auto;padding:24px 16px 80px}

/* Header */
.header{text-align:center;margin-bottom:36px;padding-top:16px}
.header-sub{font-size:10px;letter-spacing:6px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px}
.header h1{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:var(--text);letter-spacing:4px;margin-bottom:4px}
.header-tagline{font-size:12px;color:var(--text-faint);letter-spacing:1px}

/* Preset Bar */
.preset-bar{margin-bottom:28px}
.section-label{font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;display:block}
.preset-grid{display:flex;flex-wrap:wrap;gap:6px}
.preset-btn{
  padding:7px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:6px;color:var(--text-dim);cursor:pointer;font-size:11px;
  font-family:'Noto Serif JP',serif;transition:all .2s;
}
.preset-btn:hover{border-color:var(--gold-border);color:var(--gold)}
.preset-btn.active{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold)}

/* Chord Slots */
.chord-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px}
.chord-slot{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:14px 8px;text-align:center;transition:all .3s;
}
.chord-slot.playing{
  background:var(--gold-bg);border-color:var(--border-active);
  box-shadow:0 0 20px rgba(180,160,120,0.08);
}
.chord-num{font-size:9px;color:var(--text-faint);letter-spacing:2px;margin-bottom:6px}
.chord-slot select{
  width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  border-radius:5px;color:var(--text);padding:5px 4px;font-size:12px;
  font-family:'Noto Serif JP',serif;outline:none;cursor:pointer;
  -webkit-appearance:none;appearance:none;text-align:center;
}
.chord-slot select+select{margin-top:5px}
.chord-notes{font-size:8px;color:var(--text-faint);margin-top:6px;letter-spacing:1px}

/* Controls */
.controls{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
.control-group label{display:block;font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px}
.control-group select{
  width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  border-radius:5px;color:var(--text);padding:6px 8px;font-size:12px;
  font-family:'Noto Serif JP',serif;outline:none;cursor:pointer;
}
.control-group input[type=range]{width:100%;accent-color:#b4a078;margin-top:2px}
.range-val{font-size:11px;color:var(--text-dim);float:right}

/* Visualizer */
.visualizer{
  height:60px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;margin-bottom:28px;overflow:hidden;position:relative;
}
.viz-bar{
  position:absolute;bottom:0;width:3px;background:linear-gradient(to top,var(--gold),transparent);
  border-radius:2px 2px 0 0;transition:height .1s;opacity:0.6;
}

/* Action Buttons */
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
.btn{
  padding:12px 32px;border-radius:7px;cursor:pointer;font-size:13px;
  font-family:'Noto Serif JP',serif;letter-spacing:2px;transition:all .2s;border-width:1px;border-style:solid;
}
.btn-play{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold)}
.btn-play:hover{background:rgba(180,160,120,0.2)}
.btn-stop{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.btn-midi{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}
.btn-midi:hover{background:rgba(100,140,180,0.18)}
.btn-save{background:rgba(120,180,120,0.1);border-color:rgba(120,180,120,0.3);color:#8ac88a}
.btn-save:hover{background:rgba(120,180,120,0.18)}
.btn-share{background:rgba(140,120,180,0.1);border-color:rgba(140,120,180,0.3);color:#a89ad4}
.btn-share:hover{background:rgba(140,120,180,0.18)}

/* Saved Progressions */
.saved-section{margin-bottom:28px}
.saved-list{display:flex;flex-direction:column;gap:6px}
.saved-item{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border:1px solid var(--border);border-radius:7px;
  padding:10px 14px;cursor:pointer;transition:all .2s;
}
.saved-item:hover{border-color:var(--gold-border)}
.saved-name{font-size:12px;color:var(--text)}
.saved-chords{font-size:10px;color:var(--text-dim);margin-left:8px}
.saved-actions{display:flex;gap:6px}
.saved-actions button{
  background:none;border:none;color:var(--text-faint);cursor:pointer;
  font-size:11px;padding:2px 6px;transition:color .2s;
}
.saved-actions button:hover{color:var(--red)}
.empty-saved{font-size:11px;color:var(--text-faint);text-align:center;padding:16px}

/* Tips */
.tips{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:16px;font-size:11px;color:var(--text-dim);line-height:1.9;
}
.tips-title{color:var(--text-dim);margin-bottom:6px;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase}

/* Footer */
.footer{text-align:center;margin-top:32px;font-size:10px;color:var(--text-faint);letter-spacing:1px}
.footer a{color:var(--text-dim);text-decoration:none}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
  background:rgba(30,30,40,0.95);border:1px solid var(--gold-border);
  border-radius:8px;padding:10px 24px;font-size:12px;color:var(--gold);
  opacity:0;transition:all .3s;pointer-events:none;z-index:99;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:480px){
  .chord-grid{grid-template-columns:repeat(2,1fr)}
  .controls{grid-template-columns:1fr}
  .actions{flex-direction:column;align-items:center}
  .btn{width:100%;text-align:center}
}
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-sub">minimal arpeggio maker</div>
    <h1>✦ HIBIKI ✦</h1>
    <div class="header-tagline">少ない音で、深く響く。</div>
  </div>

  <!-- Presets -->
  <div class="preset-bar">
    <span class="section-label">プリセット</span>
    <div class="preset-grid" id="presetGrid"></div>
  </div>

  <!-- Chord Slots -->
  <div>
    <span class="section-label">4 コード</span>
    <div class="chord-grid" id="chordGrid"></div>
  </div>

  <!-- Visualizer -->
  <div class="visualizer" id="visualizer"></div>

  <!-- Controls -->
  <div class="controls">
    <div class="control-group">
      <label>パターン</label>
      <select id="pattern">
        <option value="up">↑ 上昇</option>
        <option value="down">↓ 下降</option>
        <option value="updown">↑↓ 上下</option>
        <option value="broken">♪ ブロークン</option>
      </select>
    </div>
    <div class="control-group">
      <label>オクターブ <span class="range-val" id="octaveVal">4</span></label>
      <input type="range" id="octave" min="2" max="6" value="4">
    </div>
    <div class="control-group">
      <label>ノート長 <span class="range-val" id="noteLenVal">400ms</span></label>
      <input type="range" id="noteLen" min="100" max="1000" step="50" value="400">
    </div>
    <div class="control-group">
      <label>間（ま）<span class="range-val" id="spacingVal">450ms</span></label>
      <input type="range" id="spacing" min="150" max="1200" step="50" value="450">
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-play" id="playBtn" onclick="togglePlay()">▶ 再生</button>
    <button class="btn btn-midi" onclick="exportMidi()">↓ MIDI書出</button>
    <button class="btn btn-save" onclick="saveProgression()">♡ 保存</button>
    <button class="btn btn-share" onclick="shareX()">𝕏 共有</button>
  </div>

  <!-- Saved Progressions -->
  <div class="saved-section">
    <span class="section-label">保存した進行</span>
    <div class="saved-list" id="savedList"></div>
  </div>

  <!-- Tips -->
  <div class="tips">
    <div class="tips-title">Tips</div>
    <div>• 「間（ま）」を大きくすると音の余白が生まれる — Dearly Beloved感の鍵</div>
    <div>• オクターブ 3〜4 がピアノの一番美しい帯域</div>
    <div>• MIDI書出 → DAWに読み込んで良いピアノ音源で鳴らすと本物に近づく</div>
    <div>• 同じ4コードでパターンだけ変えて複数バリエーション作るのがおすすめ</div>
    <div>• 引き算の美学 — 音数が少ないほどフレーズは記憶に残る</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>HIBIKI — #全人類UX改善計画</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script>
// ===== CONFIG =====
const APP_URL = "https://osakenpiro.github.io/hibiki/";
const STORAGE_KEY = "hibiki_saved";
const NOTE_NAMES = ["C","C#","D","Eb","E","F","F#","G","Ab","A","Bb","B"];
const CHORD_TYPES = {
  maj:[0,4,7], min:[0,3,7], maj7:[0,4,7,11], min7:[0,3,7,10],
  "7":[0,4,7,10], dim:[0,3,6], aug:[0,4,8], sus2:[0,2,7], sus4:[0,5,7]
};
const ROMAN = ["I","II","III","IV"];
const PRESETS = {
  "Dearly Beloved風": {chords:["Abmaj7","Bbmaj","Ebmaj","Gmaj"],pattern:"up",octave:4,noteLen:400,spacing:450},
  "切ない (Am)": {chords:["Amin","Fmaj","Cmaj","Gmaj"],pattern:"up",octave:4,noteLen:380,spacing:420},
  "ダークファンタジー": {chords:["Cmin","Abmaj","Ebmaj","Bbmaj"],pattern:"broken",octave:3,noteLen:500,spacing:520},
  "希望の光 (C)": {chords:["Cmaj7","Amin7","Fmaj7","Gmaj"],pattern:"updown",octave:4,noteLen:350,spacing:400},
  "エルデン風 (Dm)": {chords:["Dmin","Bbmaj","Amin","Cmaj"],pattern:"up",octave:3,noteLen:600,spacing:650},
  "夜明け (G)": {chords:["Gmaj","Emin","Cmaj","Dmaj"],pattern:"up",octave:4,noteLen:420,spacing:480},
  "魔法学校": {chords:["Emin","Cmaj","Gmaj","Dmaj"],pattern:"updown",octave:4,noteLen:350,spacing:380},
};

// ===== STATE =====
let state = {
  chords: ["Abmaj7","Bbmaj","Ebmaj","Gmaj"],
  pattern: "up", octave: 4, noteLen: 400, spacing: 450,
  currentPreset: "Dearly Beloved風"
};
let isPlaying = false;
let stopFlag = false;
let currentChordIdx = -1;
let synth = null;
let reverb = null;

// ===== CHORD UTILS =====
function getChordNotes(str, oct) {
  const m = str.match(/^([A-G][#b]?)(maj7|min7|maj|min|dim|aug|sus2|sus4|7)?$/);
  if (!m) return [`C${oct}`,`E${oct}`,`G${oct}`];
  const root = m[1], type = m[2]||"maj";
  const ri = NOTE_NAMES.indexOf(root);
  if (ri===-1) return [`C${oct}`,`E${oct}`,`G${oct}`];
  return (CHORD_TYPES[type]||[0,4,7]).map(iv => {
    const ni = (ri+iv)%12;
    const o = oct + Math.floor((ri+iv)/12);
    return `${NOTE_NAMES[ni]}${o}`;
  });
}

function applyPattern(notes, pat) {
  switch(pat) {
    case "down": return [...notes].reverse();
    case "updown": return [...notes, ...[...notes].reverse().slice(1)];
    case "broken": return notes.length>=3 ? [notes[0],notes[2],notes[1],notes[2]] : notes;
    default: return [...notes];
  }
}

// ===== UI RENDERING =====
function renderPresets() {
  const g = document.getElementById("presetGrid");
  g.innerHTML = "";
  Object.keys(PRESETS).forEach(name => {
    const b = document.createElement("button");
    b.className = "preset-btn" + (state.currentPreset===name?" active":"");
    b.textContent = name;
    b.onclick = () => loadPreset(name);
    g.appendChild(b);
  });
}

function renderChords() {
  const g = document.getElementById("chordGrid");
  g.innerHTML = "";
  const types = Object.keys(CHORD_TYPES);
  state.chords.forEach((chord, i) => {
    const m = chord.match(/^([A-G][#b]?)(maj7|min7|maj|min|dim|aug|sus2|sus4|7)?$/);
    const root = m?m[1]:"C", type = m?(m[2]||"maj"):"maj";
    const slot = document.createElement("div");
    slot.className = "chord-slot" + (currentChordIdx===i?" playing":"");
    slot.id = "chord-"+i;

    const num = document.createElement("div");
    num.className = "chord-num";
    num.textContent = ROMAN[i];

    const selRoot = document.createElement("select");
    NOTE_NAMES.forEach(n => {
      const o = document.createElement("option");
      o.value=n; o.textContent=n; if(n===root) o.selected=true;
      selRoot.appendChild(o);
    });
    selRoot.onchange = () => { state.chords[i]=selRoot.value+selType.value; state.currentPreset=""; renderPresets(); renderChordNotes(i); };

    const selType = document.createElement("select");
    types.forEach(t => {
      const o = document.createElement("option");
      o.value=t; o.textContent=t; if(t===type) o.selected=true;
      selType.appendChild(o);
    });
    selType.onchange = () => { state.chords[i]=selRoot.value+selType.value; state.currentPreset=""; renderPresets(); renderChordNotes(i); };

    const notesDiv = document.createElement("div");
    notesDiv.className = "chord-notes";
    notesDiv.id = "chord-notes-"+i;
    notesDiv.textContent = getChordNotes(chord, state.octave).join(" ");

    slot.appendChild(num);
    slot.appendChild(selRoot);
    slot.appendChild(selType);
    slot.appendChild(notesDiv);
    g.appendChild(slot);
  });
}

function renderChordNotes(i) {
  const el = document.getElementById("chord-notes-"+i);
  if(el) el.textContent = getChordNotes(state.chords[i], state.octave).join(" ");
}

function renderSaved() {
  const list = document.getElementById("savedList");
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
  if(saved.length===0) {
    list.innerHTML = '<div class="empty-saved">保存した進行はまだありません</div>';
    return;
  }
  list.innerHTML = "";
  saved.forEach((item, i) => {
    const row = document.createElement("div");
    row.className = "saved-item";
    row.onclick = () => loadSaved(i);

    const info = document.createElement("div");
    const name = document.createElement("span");
    name.className = "saved-name";
    name.textContent = item.name || `進行 ${i+1}`;
    const chords = document.createElement("span");
    chords.className = "saved-chords";
    chords.textContent = item.chords.join(" → ");
    info.appendChild(name);
    info.appendChild(chords);

    const acts = document.createElement("div");
    acts.className = "saved-actions";
    const del = document.createElement("button");
    del.textContent = "✕";
    del.onclick = (e) => { e.stopPropagation(); deleteSaved(i); };
    acts.appendChild(del);

    row.appendChild(info);
    row.appendChild(acts);
    list.appendChild(row);
  });
}

function initVisualizer() {
  const viz = document.getElementById("visualizer");
  viz.innerHTML = "";
  const w = viz.offsetWidth;
  const count = Math.floor(w / 6);
  for(let i=0; i<count; i++) {
    const bar = document.createElement("div");
    bar.className = "viz-bar";
    bar.style.left = (i*6)+"px";
    bar.style.height = "0px";
    viz.appendChild(bar);
  }
}

function animateViz(noteIdx) {
  const bars = document.querySelectorAll(".viz-bar");
  if(!bars.length) return;
  const center = Math.floor((noteIdx / 12) * bars.length) % bars.length;
  bars.forEach((b, i) => {
    const dist = Math.abs(i - center);
    const h = Math.max(0, 50 - dist * 2 + Math.random()*10);
    b.style.height = h + "px";
  });
  setTimeout(() => {
    bars.forEach(b => { b.style.height = Math.max(0, parseFloat(b.style.height)-20)+"px"; });
  }, 200);
}

// ===== CONTROLS =====
function syncControls() {
  document.getElementById("pattern").value = state.pattern;
  document.getElementById("octave").value = state.octave;
  document.getElementById("noteLen").value = state.noteLen;
  document.getElementById("spacing").value = state.spacing;
  document.getElementById("octaveVal").textContent = state.octave;
  document.getElementById("noteLenVal").textContent = state.noteLen+"ms";
  document.getElementById("spacingVal").textContent = state.spacing+"ms";
}

document.getElementById("pattern").onchange = function(){ state.pattern=this.value; };
document.getElementById("octave").oninput = function(){
  state.octave=+this.value;
  document.getElementById("octaveVal").textContent=this.value;
  state.chords.forEach((_,i) => renderChordNotes(i));
};
document.getElementById("noteLen").oninput = function(){
  state.noteLen=+this.value;
  document.getElementById("noteLenVal").textContent=this.value+"ms";
};
document.getElementById("spacing").oninput = function(){
  state.spacing=+this.value;
  document.getElementById("spacingVal").textContent=this.value+"ms";
};

// ===== PRESETS =====
function loadPreset(name) {
  const p = PRESETS[name];
  if(!p) return;
  state.chords = [...p.chords];
  state.pattern = p.pattern;
  state.octave = p.octave;
  state.noteLen = p.noteLen;
  state.spacing = p.spacing;
  state.currentPreset = name;
  syncControls();
  renderPresets();
  renderChords();
  showToast(`${name} を読み込みました`);
}

// ===== PLAYBACK =====
async function togglePlay() {
  if(isPlaying) { stopPlayback(); return; }
  await Tone.start();
  stopFlag = false;

  if(synth) synth.dispose();
  if(reverb) reverb.dispose();
  reverb = new Tone.Reverb({decay:3, wet:0.4}).toDestination();
  synth = new Tone.PolySynth(Tone.Synth, {
    oscillator:{type:"triangle"},
    envelope:{attack:0.02, decay:0.8, sustain:0.2, release:1.5},
    volume:-8
  }).connect(reverb);

  isPlaying = true;
  const btn = document.getElementById("playBtn");
  btn.textContent = "■ 停止";
  btn.className = "btn btn-stop";

  for(let rep=0; rep<4; rep++) {
    for(let ci=0; ci<state.chords.length; ci++) {
      if(stopFlag) break;
      if(!state.chords[ci]) continue;
      currentChordIdx = ci;
      highlightChord(ci);
      const notes = getChordNotes(state.chords[ci], state.octave);
      const arp = applyPattern(notes, state.pattern);
      for(const note of arp) {
        if(stopFlag) break;
        synth.triggerAttackRelease(note, state.noteLen/1000);
        const midi = noteToMidi(note);
        animateViz(midi);
        await sleep(state.spacing);
      }
    }
    if(stopFlag) break;
  }
  stopPlayback();
}

function stopPlayback() {
  stopFlag = true;
  isPlaying = false;
  currentChordIdx = -1;
  const btn = document.getElementById("playBtn");
  btn.textContent = "▶ 再生";
  btn.className = "btn btn-play";
  if(synth) synth.releaseAll();
  document.querySelectorAll(".chord-slot").forEach(s => s.classList.remove("playing"));
}

function highlightChord(idx) {
  document.querySelectorAll(".chord-slot").forEach((s,i) => {
    s.classList.toggle("playing", i===idx);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function noteToMidi(note) {
  const map={C:0,"C#":1,Db:1,D:2,"D#":3,Eb:3,E:4,F:5,"F#":6,Gb:6,G:7,"G#":8,Ab:8,A:9,"A#":10,Bb:10,B:11};
  const m=note.match(/^([A-G][#b]?)(\d)$/);
  if(!m) return 60;
  return map[m[1]]+(parseInt(m[2])+1)*12;
}

// ===== MIDI EXPORT =====
function exportMidi() {
  const tpb = 480;
  const bpm = 80;
  const msPerTick = 60000/bpm/tpb;

  function varLen(v) {
    const b=[];let x=v;
    b.unshift(x&0x7f);
    while((x>>=7)>0) b.unshift((x&0x7f)|0x80);
    return b;
  }

  const events=[];
  let tick=0;
  const durTicks=Math.round((state.noteLen/1000)/msPerTick*tpb/2);
  const spaceTicks=Math.round((state.spacing/1000)/msPerTick*tpb/2);

  for(let rep=0;rep<4;rep++){
    for(const chord of state.chords){
      if(!chord) continue;
      const notes=getChordNotes(chord,state.octave);
      const arp=applyPattern(notes,state.pattern);
      for(const n of arp){
        const midi=noteToMidi(n);
        events.push({tick,type:0x90,note:midi,vel:70});
        events.push({tick:tick+durTicks,type:0x80,note:midi,vel:0});
        tick+=spaceTicks;
      }
    }
  }
  events.sort((a,b)=>a.tick-b.tick||a.type-b.type);

  const td=[];
  const tempo=Math.round(60000000/bpm);
  td.push(0x00,0xff,0x51,0x03,(tempo>>16)&0xff,(tempo>>8)&0xff,tempo&0xff);
  let lt=0;
  for(const e of events){
    td.push(...varLen(e.tick-lt));
    td.push(e.type,e.note,e.vel||70);
    lt=e.tick;
  }
  td.push(0x00,0xff,0x2f,0x00);

  const hdr=[0x4d,0x54,0x68,0x64,0,0,0,6,0,0,0,1,(tpb>>8)&0xff,tpb&0xff];
  const tl=td.length;
  const trk=[0x4d,0x54,0x72,0x6b,(tl>>24)&0xff,(tl>>16)&0xff,(tl>>8)&0xff,tl&0xff,...td];
  const blob=new Blob([new Uint8Array([...hdr,...trk])],{type:"audio/midi"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="hibiki_arpeggio.mid";
  a.click();
  URL.revokeObjectURL(a.href);
  showToast("MIDIファイルを書き出しました");
}

// ===== SAVE / LOAD =====
function saveProgression() {
  const name = prompt("進行に名前をつけてください:", state.chords.join(" → "));
  if(!name) return;
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
  saved.push({
    name, chords:[...state.chords], pattern:state.pattern,
    octave:state.octave, noteLen:state.noteLen, spacing:state.spacing,
    created: new Date().toISOString()
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  renderSaved();
  showToast("保存しました");
}

function loadSaved(idx) {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
  const item = saved[idx];
  if(!item) return;
  state.chords = [...item.chords];
  state.pattern = item.pattern;
  state.octave = item.octave;
  state.noteLen = item.noteLen;
  state.spacing = item.spacing;
  state.currentPreset = "";
  syncControls();
  renderPresets();
  renderChords();
  showToast(`「${item.name}」を読み込みました`);
}

function deleteSaved(idx) {
  if(!confirm("この進行を削除しますか？")) return;
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
  saved.splice(idx, 1);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  renderSaved();
  showToast("削除しました");
}

// ===== X/TWITTER SHARE =====
function shareX() {
  const chordStr = state.chords.join(" → ");
  const text = `🎹 ${chordStr}\nPattern: ${state.pattern} / Oct: ${state.octave} / 間: ${state.spacing}ms\n\nHIBIKI - 4コードアルペジオメーカー\n#HIBIKI #全人類UX改善計画`;
  const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(APP_URL)}`;
  window.open(url, "_blank");
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

// ===== INIT =====
function init() {
  renderPresets();
  renderChords();
  renderSaved();
  syncControls();
  initVisualizer();
  window.addEventListener("resize", initVisualizer);
}
init();
</script>
